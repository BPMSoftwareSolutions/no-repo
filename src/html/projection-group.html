<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Projection Group</title>
  <link rel="stylesheet" href="../css/global-inspection.css">
</head>
<body>
  <header>
    <p><a href="index.html">Inspection Home</a> / <a href="projections.html">Projection Inspection</a></p>
    <h1 id="group-title">Projection Group</h1>
    <p><strong>Primary question:</strong> <span id="group-question">Which projection do you want to inspect?</span></p>
  </header>

  <main class="projection-workspace">
    <aside class="projection-tree-panel" aria-labelledby="tree-title">
      <h2 id="tree-title">Knowledge Tree</h2>
      <div id="projection-tree" class="projection-tree" aria-live="polite">
        <p>Loading projection tree...</p>
      </div>
    </aside>

    <section class="projection-surface-panel" aria-labelledby="group-list-title">
      <h2 id="group-list-title">Available Projections</h2>
      <div id="group-list" class="surface-list" aria-live="polite">
        <p>Loading projections...</p>
      </div>

      <aside class="attention" aria-labelledby="group-attention-title">
        <h2 id="group-attention-title">Recent Attention</h2>
        <ul id="group-attention">
          <li>Loading grouped projection context.</li>
        </ul>
      </aside>
    </section>
  </main>

  <script src="../js/projection-group.js" type="module"></script>
</body>
</html>

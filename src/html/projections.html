<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Projection Inspection</title>
  <link rel="stylesheet" href="../css/global-inspection.css">
</head>
<body>
  <header>
    <p><a href="index.html">Inspection Home</a></p>
    <h1>Projection Inspection</h1>
    <p><strong>Primary question:</strong> What operator surface do you want to inspect?</p>
  </header>

  <div id="workspace-chrome"></div>

  <main class="projection-workspace">
    <aside class="projection-tree-panel" aria-labelledby="tree-title">
      <h2 id="tree-title">Knowledge Tree</h2>
      <div id="projection-tree" class="projection-tree" aria-live="polite">
        <p>Loading projection tree...</p>
      </div>
    </aside>

    <section aria-labelledby="surfaces-title" class="projection-surface-panel">
      <h2 id="surfaces-title">Current Operator Surfaces</h2>
      <div id="surface-list" class="surface-list" aria-live="polite">
        <p>Loading operator surfaces...</p>
      </div>

      <aside class="attention" aria-labelledby="attention-title">
        <h2 id="attention-title">Recent Attention</h2>
        <ul id="recent-attention">
          <li>Checking projection availability.</li>
        </ul>
      </aside>
    </section>
  </main>

  <script src="../js/projections.js" type="module"></script>
  <script src="../js/projection-workspace.js" type="module"></script>
</body>
</html>

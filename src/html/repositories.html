<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Repository Explorer</title>
  
</head>
<body class="inspection-page">
  <header class="inspection-page__header">
    <p><a href="index.html">Inspection Home</a></p>
    <h1>Repository Explorer</h1>
    <p><strong>Primary question:</strong> Where is the code shape I need to inspect?</p>
  </header>

  <main class="inspection-page__main">
    <section class="inspection-section" aria-labelledby="repos-title">
      <h2 id="repos-title">Repositories</h2>
      <table class="inspection-table">
        <thead>
          <tr>
            <th scope="col">Repository</th>
            <th scope="col">Projects</th>
            <th scope="col">Files</th>
            <th scope="col">Symbols</th>
            <th scope="col">Open</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td data-label="Repository">ai-engine</td>
            <td data-label="Projects">14</td>
            <td data-label="Files">312</td>
            <td data-label="Symbols">2841</td>
            <td data-label="Open"><a href="repository-detail.html">Open</a></td>
          </tr>
          <tr>
            <td data-label="Repository">loga</td>
            <td data-label="Projects">5</td>
            <td data-label="Files">148</td>
            <td data-label="Symbols">904</td>
            <td data-label="Open"><a href="repository-detail.html">Open</a></td>
          </tr>
        </tbody>
      </table>
    </section>
  </main>
  <script src="../js/repositories.js" type="module"></script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Code Intelligence</title>
  
</head>
<body class="inspection-page">
  <header class="inspection-page__header">
    <p><a href="index.html">Inspection Home</a></p>
    <h1>Code Intelligence</h1>
    <p><strong>Primary question:</strong> What code relationship are we trying to understand?</p>
  </header>

  <main class="inspection-page__main">
    <form class="inspection-form" role="search">
      <label for="symbol-search">Search symbols or code intent</label>
      <input id="symbol-search" name="query" type="search" value="workflow evidence derivation">
      <button type="button">Search</button>
    </form>

    <section class="inspection-section" aria-labelledby="symbol-results-title">
      <h2 id="symbol-results-title">Ranked Results</h2>
      <table class="inspection-table">
        <thead>
          <tr>
            <th scope="col">Candidate</th>
            <th scope="col">Why Matched</th>
            <th scope="col">Open</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td data-label="Candidate">derive_checkpoint_evidence</td>
            <td data-label="Why Matched">Matched evidence and checkpoint terms</td>
            <td data-label="Open"><a href="symbol-detail.html">Open</a></td>
          </tr>
          <tr>
            <td data-label="Candidate">WorkflowRunService</td>
            <td data-label="Why Matched">Matched lifecycle and evidence symbols</td>
            <td data-label="Open"><a href="symbol-detail.html">Open</a></td>
          </tr>
        </tbody>
      </table>
    </section>
  </main>
  <script src="../js/code-intelligence.js" type="module"></script>
</body>
</html>

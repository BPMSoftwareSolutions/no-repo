<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Projection Detail</title>
</head>
<body class="projection-shell-page">
  <header id="page-header"></header>

  <div id="workspace-chrome"></div>

  <main class="projection-shell projection-shell--resizable">
    <aside class="projection-shell__tree" aria-labelledby="tree-title">
      <div class="projection-shell__tree-header">
        <h2 id="tree-title" class="projection-shell__title">Knowledge Tree</h2>
        <button id="tree-panel-toggle" class="projection-shell__tree-toggle" type="button" aria-expanded="true">Hide panel</button>
      </div>
      <div id="projection-tree" class="projection-tree" aria-live="polite">
        <p>Loading projection tree...</p>
      </div>
    </aside>

    <div id="tree-panel-resizer" class="projection-shell__resizer" role="separator" aria-label="Resize side panel" aria-orientation="vertical"></div>

    <article class="projection-shell__surface">
      <div id="projection-content" class="rendered" aria-live="polite">
        <p>Loading projection...</p>
      </div>

      <details>
        <summary>Evidence Drawer</summary>
        <pre><code id="evidence-content">Projection evidence will appear after the surface loads.</code></pre>
      </details>
    </article>
  </main>

  <script src="../js/projection-detail.js" type="module"></script>
  <script src="../js/projection-workspace.js" type="module"></script>
</body>
</html>

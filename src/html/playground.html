<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Governed Interaction Playground</title>
  
  <style>
    body {
      margin: 0;
      padding: 0;
      display: grid;
      grid-template-columns: 250px 1fr 1fr;
      grid-template-rows: 1fr 200px;
      height: 100vh;
      overflow: hidden;
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
    }
    
    /* Panel generic styles */
    .panel {
      border: 1px solid var(--line);
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
    }
    .panel-header {
      font-size: 13px;
      font-weight: bold;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--line-soft);
      padding-bottom: 8px;
      margin-bottom: 16px;
      flex-shrink: 0;
    }
    
    #nav-shell {
      grid-column: 1;
      grid-row: 1 / 3;
      background: var(--bg-2);
    }
    
    #projection-viewer {
      grid-column: 2;
      grid-row: 1;
    }
    
    #code-inspection {
      grid-column: 3;
      grid-row: 1;
    }
    
    #trace-panel {
      grid-column: 2 / 4;
      grid-row: 2;
      background: rgba(3, 7, 18, 0.82);
      font-family: var(--mono);
      font-size: 12px;
      color: #dbeafe;
    }
    
    .nav-item {
      display: block;
      padding: 8px 12px;
      color: var(--accent);
      text-decoration: none;
      margin-bottom: 4px;
      border-radius: 4px;
      cursor: pointer;
    }
    .nav-item:hover {
      background: var(--surface-hover);
    }
    
    .trace-log {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .trace-entry {
      border-bottom: 1px solid var(--line-soft);
      padding-bottom: 4px;
    }
    .trace-time { color: var(--muted-2); margin-right: 8px; }
    .trace-method { color: var(--accent); font-weight: bold; }
    .trace-status { color: var(--green); }
    .trace-status.error { color: var(--red); }
  </style>
</head>
<body>

  <!-- Navigation Shell -->
  <aside id="nav-shell" class="panel">
    <div class="panel-header">Navigation Shell</div>
    <nav id="nav-links">
      <a class="nav-item" data-action="loadHome">🏠 Operator Home</a>
      <a class="nav-item" data-action="loadProjects">📁 Projects Catalog</a>
      <a class="nav-item" data-action="loadCodebaseShape">📐 Codebase Shape</a>
    </nav>
    <div id="context-info" style="margin-top: 24px; font-size: 12px; color: var(--muted);">
      <!-- Context like selected project, etc. -->
    </div>
  </aside>

  <!-- Projection Viewer -->
  <main id="projection-viewer" class="panel">
    <div class="panel-header">Projection Viewer (Human View)</div>
    <div id="projection-content">
      <p style="color: var(--muted-2);">Select an item from the navigation shell...</p>
    </div>
  </main>

  <!-- Code Inspection Panel -->
  <aside id="code-inspection" class="panel">
    <div class="panel-header">Code Inspection (System View)</div>
    <div id="inspection-controls" style="margin-bottom: 16px;">
      <input type="text" id="inspect-symbol-input" placeholder="Enter Symbol or Path..." style="width: 100%; margin-bottom: 8px;"/>
      <button id="inspect-symbol-btn" style="width: 100%;">Inspect Symbol</button>
      <button id="inspect-file-btn" style="width: 100%; margin-top: 8px;">Inspect File</button>
    </div>
    <div id="inspection-content">
      <p style="color: var(--muted-2);">Enter a symbol or file path to inspect...</p>
    </div>
  </aside>

  <!-- SDK Call Trace Panel -->
  <footer id="trace-panel" class="panel">
    <div class="panel-header" style="color: var(--muted-2);">SDK Call Trace Panel (System Boundary)</div>
    <div class="trace-log" id="trace-log">
      <!-- Traces go here -->
    </div>
  </footer>

  <script src="playground.js" type="module"></script>
</body>
</html>
